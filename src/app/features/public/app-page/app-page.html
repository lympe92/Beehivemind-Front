@if (pageData$ | async; as page) {
  <app-hero-left-content
    [title]="page.hero.title"
    [subtitle]="page.hero.subtitle"
    [image]="page.hero.image"
    [primaryCta]="page.hero.primaryCta"
    [secondaryCta]="page.hero.secondaryCta" />

  <app-ribbon
    [mode]="page.ribbon.mode"
    [quote]="page.ribbon.quote" />

  <app-split-content
    [title]="page.splitContent.title"
    [description]="page.splitContent.description"
    [image]="page.splitContent.image" />

  <app-text-columns [columns]="page.textColumns" />

  <app-split-accordion
    [title]="page.splitAccordion1.title"
    [image]="page.splitAccordion1.image"
    [items]="page.splitAccordion1.items" />

  <app-application-download
    [title]="page.applicationDownload.title"
    [subtitle]="page.applicationDownload.subtitle"
    [logo]="page.applicationDownload.logo"
    [storeLinks]="page.applicationDownload.storeLinks" />

  <app-split-accordion
    [title]="page.splitAccordion2.title"
    [image]="page.splitAccordion2.image"
    [items]="page.splitAccordion2.items" />

  <app-info-columns
    [title]="page.infoColumns.title"
    [items]="page.infoColumns.items" />

  <app-cta-banner
    [title]="page.ctaBanner.title"
    [description]="page.ctaBanner.description"
    [cta]="page.ctaBanner.cta" />
}
