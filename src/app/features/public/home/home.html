@if (pageData$ | async; as page) {
  <app-hero-left-content
    [title]="page.hero.title"
    [subtitle]="page.hero.subtitle"
    [image]="page.hero.image"
    [primaryCta]="page.hero.primaryCta"
    [secondaryCta]="page.hero.secondaryCta" />

  <app-ribbon
    [mode]="page.ribbon1.mode"
    [quote]="page.ribbon1.quote"
    [author]="page.ribbon1.author" />

  <app-split-accordion
    [title]="page.splitAccordion.title"
    [image]="page.splitAccordion.image"
    [items]="page.splitAccordion.items" />

  <app-features-row
    [items]="page.featuresRow.items"
    [cta]="page.featuresRow.cta" />

  <app-ribbon
    [mode]="page.ribbon2.mode"
    [quote]="page.ribbon2.quote" />

  <app-split-list
    [title]="page.splitList.title"
    [items]="page.splitList.items"
    [image]="page.splitList.image"
    [cta]="page.splitList.cta" />

  <app-info-columns
    [mode]="page.infoColumns.mode"
    [title]="page.infoColumns.title"
    [items]="page.infoColumns.items" />

  <app-cta-banner
    [title]="page.ctaBanner.title"
    [description]="page.ctaBanner.description"
    [cta]="page.ctaBanner.cta" />
}
