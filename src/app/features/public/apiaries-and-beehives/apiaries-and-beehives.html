@if (hero$ | async; as hero) {
  <app-hero-center-content
    [title]="hero.title"
    [subtitle]="hero.subtitle"
    [image]="hero.image"
    [primaryCta]="hero.primaryCta"
    [secondaryCta]="hero.secondaryCta" />
}

@if (splitContents$ | async; as contents) {
  @for (content of contents; track content.title) {
    <app-split-content
      [title]="content.title"
      [description]="content.description"
      [image]="content.image" />
  }
}

@if (infoColumns$ | async; as infoColumns) {
  <app-info-columns
    [title]="infoColumns.title"
    [items]="infoColumns.items" />
}

@if (ctaBanner$ | async; as ctaBanner) {
  <app-cta-banner
    [title]="ctaBanner.title"
    [description]="ctaBanner.description"
    [cta]="ctaBanner.cta" />
}
