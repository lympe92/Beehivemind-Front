<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>Welcome back</h1>
      <p>Sign in to your BeehiveMind account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      @if (error$ | async; as error) {
        <div class="auth-form__error">
          {{ error }}
          @if (retryAfterMinutes$ | async; as minutes) {
            <span class="auth-form__error-hint">Try again in {{ minutes }} minute{{ minutes === 1 ? '' : 's' }}.</span>
          }
        </div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">
          Password
          <a routerLink="/auth/reset-password" class="form-group__link">Forgot password?</a>
        </label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="auth-btn" [disabled]="form.invalid || (loading$ | async)">
        @if (loading$ | async) { Signing in... } @else { Sign In }
      </button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <div id="google-signin-btn" class="auth-google-btn">
      <button type="button" class="auth-google-placeholder" disabled>
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.566 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
    </div>

    <p class="auth-card__footer">
      Don't have an account? <a routerLink="/auth/register">Sign up</a>
    </p>
  </div>
</div>
