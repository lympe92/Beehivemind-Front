<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>Welcome back</h1>
      <p>Sign in to your BeehiveMind account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      @if (error$ | async; as error) {
        <div class="auth-form__error">{{ error }}</div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">
          Password
          <a routerLink="/auth/reset-password" class="form-group__link">Forgot password?</a>
        </label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="auth-btn" [disabled]="form.invalid || (loading$ | async)">
        @if (loading$ | async) { Signing in... } @else { Sign In }
      </button>
    </form>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <div id="google-signin-btn" class="auth-google-btn"></div>

    <p class="auth-card__footer">
      Don't have an account? <a routerLink="/auth/register">Sign up</a>
    </p>
  </div>
</div>
