<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__header">
      <h1>Create account</h1>
      <p>Start managing your beehives with BeehiveMind</p>
    </div>

    @if (success()) {
      <div class="auth-info">
        Account created! Check your email to confirm your account before signing in.
      </div>
      <p class="auth-card__footer">
        <a routerLink="/auth/login">Back to login</a>
      </p>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        @if (error()) {
          <div class="auth-form__error">{{ error() }}</div>
        }

        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" formControlName="name" placeholder="John" autocomplete="given-name" />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" formControlName="surname" placeholder="Doe" autocomplete="family-name" />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="Min. 8 characters" autocomplete="new-password" />
        </div>

        <button type="submit" class="auth-btn" [disabled]="form.invalid || loading()">
          {{ loading() ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <p class="auth-card__footer">
        Already have an account? <a routerLink="/auth/login">Sign in</a>
      </p>
    }
  </div>
</div>
