<div class="harvest">

  <app-filter-bar
    [apiaries]="apiaries()"
    [beehives]="beehives()"
    [apiaryId]="selectedApiaryId()"
    (apiaryIdChange)="onApiaryChange($event)"
    [beehiveId]="selectedBeehiveId()"
    (beehiveIdChange)="onBeehiveChange($event)" />

  <app-card title="Harvest Data">
    <button card-header-end class="harvest__btn harvest__btn--primary" (click)="startAdd()">+ Add Record</button>

    <app-data-table
      [columns]="columns()"
      [rows]="harvest()"
      [loading]="loading()"
      [showActions]="true"
      emptyMessage="No harvest records found.">

      <ng-template #cellTpl let-row let-col="col">
        @switch (col.key) {
          @case ('honey_description') { {{ row.honey_description || '—' }} }
          @case ('beehiveId') { {{ getBeehiveName(row.beehiveId) }} }
          @default { {{ row[col.key] ?? '—' }} }
        }
      </ng-template>

      <ng-template #actionsTpl let-row>
        <button class="harvest__btn harvest__btn--ghost harvest__btn--sm" (click)="startEdit(row)">Edit</button>
        <button class="harvest__btn harvest__btn--danger harvest__btn--sm" (click)="deleteRow(row)">Delete</button>
      </ng-template>

    </app-data-table>

  </app-card>

</div>
