<div class="financial">

  <!-- CRUD tables -->
  <div class="financial__row financial__row--2col">
    <div class="financial__card">
      <div class="financial__card-header">Cost Categories</div>
      <div class="financial__card-body financial__card-body--scroll">
        <app-cost-categories (categoriesChange)="onCategoriesChange($event)" />
      </div>
    </div>

    <div class="financial__card">
      <div class="financial__card-header">Costs</div>
      <div class="financial__card-body financial__card-body--scroll">
        <app-costs [costCategories]="costCategories()" (costsChange)="onCostsChange()" />
      </div>
    </div>
  </div>

  <!-- Monthly bar chart -->
  <div class="financial__card">
    <div class="financial__card-header">Income / Outgoing per Month</div>
    <div class="financial__card-body">
      <app-apex-chart [options]="monthlyBarOptions()" [loading]="chartsLoading()" height="320" />
    </div>
  </div>

  <!-- Three pies -->
  <div class="financial__row financial__row--3col">
    <div class="financial__card">
      <div class="financial__card-header">Income / Outgoing</div>
      <div class="financial__card-body">
        <app-apex-chart [options]="summaryPieOptions()" [loading]="chartsLoading()" height="260" />
      </div>
    </div>

    <div class="financial__card">
      <div class="financial__card-header">Income by Category</div>
      <div class="financial__card-body">
        <app-apex-chart [options]="incomePieOptions()" [loading]="chartsLoading()" height="260" />
      </div>
    </div>

    <div class="financial__card">
      <div class="financial__card-header">Outgoing by Category</div>
      <div class="financial__card-body">
        <app-apex-chart [options]="outcomePieOptions()" [loading]="chartsLoading()" height="260" />
      </div>
    </div>
  </div>

</div>
