<div class="apiary">

  <app-card title="Apiaries List">
    <button card-header-end class="apiary__btn apiary__btn--primary" (click)="startAdd()">+ Add</button>

    <app-data-table
      [columns]="columns"
      [rows]="apiaries()"
      [loading]="loading()"
      [pagination]="tablePagination"
      (pageChange)="goToPage($event)"
      emptyMessage="No apiaries yet. Add one to get started.">

      <ng-template #cellTpl let-row let-col="col">
        @switch (col.key) {
          @case ('dateEstablished') {
            {{ row.dateEstablished ? (row.dateEstablished | date:'mediumDate') : '—' }}
          }
          @default { {{ row[col.key] ?? '—' }} }
        }
      </ng-template>

      <ng-template #actionsTpl let-row>
        <button class="apiary__btn apiary__btn--ghost apiary__btn--sm" (click)="startEdit(row)">Edit</button>
        <button class="apiary__btn apiary__btn--danger apiary__btn--sm" (click)="deleteRow(row)">Delete</button>
      </ng-template>

    </app-data-table>
  </app-card>

</div>
