<div class="dashboard">

  <!-- Filters -->
  <app-filter-bar
    [apiaries]="apiaries()"
    [beehives]="filteredBeehives()"
    [apiaryId]="selectedApiaryId() ?? 0"
    (apiaryIdChange)="onApiaryChange($event)"
    [beehiveId]="selectedBeehiveId() ?? 0"
    (beehiveIdChange)="onBeehiveChange($event)" />

  <!-- Variables over Time -->
  <app-card title="Variables over Time">
    <app-apex-chart [options]="variablesLineOptions()" [loading]="chartLoading()" height="300" />
  </app-card>

  <!-- Population and Frames over Time -->
  <app-card title="Population and Frames over Time">
    <app-apex-chart [options]="populationLineOptions()" [loading]="chartLoading()" height="300" />
  </app-card>

  <!-- Last Inspection / Queens Ages / Brood Ratio -->
  <div class="dashboard__row--3col">
    <app-card title="Last Inspection">
      <app-apex-chart [options]="lastInspectionBarOptions()" [loading]="chartLoading()" height="280" />
    </app-card>

    <app-card title="Queens Ages">
      <app-apex-chart [options]="queensPieOptions()" [loading]="chartLoading()" height="280" />
    </app-card>

    <app-card title="Ratio Opened / Closed Brood">
      <app-apex-chart [options]="broodPieOptions()" [loading]="chartLoading()" height="280" />
    </app-card>
  </div>

  <!-- Detections -->
  <app-card title="Detections">
    @if (detections(); as row) {
      <div class="dashboard__detections">
        <table class="dashboard__detections-table">
          <thead>
            <tr>
              <th>No Queen</th>
              <th>Varroa</th>
              <th>American Foulbrood</th>
              <th>European Foulbrood</th>
              <th>Nosema</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>{{ row.no_queen }}</td>
              <td>{{ row.varroa }}</td>
              <td>{{ row.american_foulbrood }}</td>
              <td>{{ row.european_foulbrood }}</td>
              <td>{{ row.nosema }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    } @else {
      <p class="dashboard__detections-empty">No data available.</p>
    }
  </app-card>

</div>
