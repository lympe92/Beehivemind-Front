<div class="dashboard-filters">
  <div class="dashboard-filters__group">
    <label class="dashboard-filters__label">Apiary</label>
    <select
      class="dashboard-filters__select"
      [(ngModel)]="selectedApiary"
      (ngModelChange)="onApiaryChange($event)"
      name="apiary">
      <option [ngValue]="0">— All —</option>
      @for (apiary of apiaries(); track apiary.id) {
        <option [ngValue]="apiary.id">{{ apiary.name }}</option>
      }
    </select>
  </div>

  @if (beehives().length) {
    <div class="dashboard-filters__group">
      <label class="dashboard-filters__label">Beehive</label>
      <select
        class="dashboard-filters__select"
        [(ngModel)]="selectedBeehive"
        (ngModelChange)="onBeehiveChange($event)"
        name="beehive">
        <option [ngValue]="0">— All —</option>
        @for (beehive of beehives(); track beehive.id) {
          <option [ngValue]="beehive.id">{{ beehive.name }}</option>
        }
      </select>
    </div>
  }
</div>
