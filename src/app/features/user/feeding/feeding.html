<div class="feeding">

  <app-filter-bar
    [apiaries]="apiaries()"
    [beehives]="beehives()"
    [apiaryId]="selectedApiaryId()"
    (apiaryIdChange)="onApiaryChange($event)"
    [beehiveId]="selectedBeehiveId()"
    (beehiveIdChange)="onBeehiveChange($event)" />

  <app-card title="Feeding Data">
    <button card-header-end class="feeding__btn feeding__btn--primary" (click)="startAdd()">+ Add Record</button>

    <app-data-table
      [columns]="columns"
      [rows]="feeding()"
      [loading]="loading()"
      [showActions]="true"
      emptyMessage="No feeding records found.">

      <ng-template #actionsTpl let-row>
        <button class="feeding__btn feeding__btn--ghost feeding__btn--sm" (click)="startEdit(row)">Edit</button>
        <button class="feeding__btn feeding__btn--danger feeding__btn--sm" (click)="deleteRow(row)">Delete</button>
      </ng-template>

    </app-data-table>

  </app-card>

</div>
