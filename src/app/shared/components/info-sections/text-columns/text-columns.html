<section class="text-columns">
  <div class="container">
    <div class="grid md:grid-cols-3 gap-lg">
      @for (column of columns(); track column.title) {
        <div>
          <h3 class="text-center">{{ column.title }}</h3>
          <p>{{ column.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
