<section class="container features-list-cta">
  <div class="flex-col">
    <h2 class="text-center">With our beekeeping software you have all the variables you need to work</h2>
    <div class="flex flex-wrap">
      @for (item of items; track item.title) {
        <div class="features-list-cta__item flex-col items-center w-1/3">
          <app-image [src]="item.img.src" [alt]="item.img.alt" [width]="item.img.width" [height]="item.img.height" />
          <h3 class="text-center">{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        </div>
      }
    </div>

    <div class="text-center" data-aos="fade-up" data-aos-anchor-placement="bottom-bottom">
      <a href="https://beehivemind.freshdesk.com/support/home" target="_blank" rel="noopener"
         class="btn btn--primary btn--md">Explore the docs</a>
    </div>

  </div>
</section>
