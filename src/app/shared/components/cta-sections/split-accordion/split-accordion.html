<section class="container section-divider">
  <div class="flex-col lg:flex-row">
    <div class="w-full lg:w-1/2 rightp">
      <h2>{{ title() }}</h2>
      <app-image
        [src]="image().src"
        [alt]="image().alt"
        [width]="image().width"
        [height]="image().height"
        [priority]="image().priority ?? false" />
    </div>
    <div class="w-full lg:w-1/2">
      <div role="tablist" id="accordion-1">
        @for (item of items(); track item.title; let i = $index) {
          <div class="card">
            <div class="card-header" role="tab">
              <h3 class="mb-0">
                <a data-toggle="collapse"
                   [attr.aria-expanded]="i === 0"
                   [attr.aria-controls]="'accordion-1 .item-' + (i + 1)"
                   [attr.href]="'div#accordion-1 .item-' + (i + 1)"
                   class="colbl">
                  {{ item.title }}
                  <a style="color:#ec861f;" href="javascript:;">»</a>
                </a>
              </h3>
            </div>
            <div [class]="'collapse' + (i === 0 ? ' show' : '') + ' item-' + (i + 1)"
                 role="tabpanel" data-parent="#accordion-1">
              <div class="card-body">
                <h5 class="card-text text-justify">{{ item.body }}</h5>
                <a class="colport" [href]="item.linkHref">{{ item.linkLabel }}</a>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
