<section class="container">
  <div class="flex-col lg:flex-row items-center">
    <div class="w-full lg:w-1/2">
      <h2>{{ title() }}</h2>
      <div class="split-list">
        @for (item of items(); track item.title) {
          <h3>{{ item.title }}</h3>
          <p>{{ item.description }}</p>
        }
      </div>
    </div>
    <div class="w-full lg:w-1/2" data-aos="zoom-in" data-aos-anchor-placement="center-bottom">
      <app-image
        [src]="image().src"
        [alt]="image().alt"
        [width]="image().width"
        [height]="image().height"
        [priority]="image().priority ?? false" />
    </div>
  </div>
  <div class="text-center" data-aos="fade-up" data-aos-anchor-placement="bottom-bottom">
    <app-link
      [routerLink]="cta().routerLink"
      [variant]="cta().variant ?? 'outline'"
      [size]="cta().size ?? 'md'">
      {{ cta().label }}
    </app-link>
  </div>
</section>
