<section class="container hero">
  <div class="flex-col lg:flex-row">
    <div class="md:w-full lg:w-1/2 self-center">
      <h1>{{ title() }}</h1>
      <h4>{{ subtitle() }}</h4>
      <div data-aos="fade-up" data-aos-anchor-placement="bottom-bottom">
        <app-link
          [routerLink]="primaryCta().routerLink"
          [variant]="primaryCta().variant ?? 'primary'"
          [size]="primaryCta().size ?? 'md'">
          {{ primaryCta().label }}
        </app-link>
        <app-link
          [routerLink]="secondaryCta().routerLink"
          [variant]="secondaryCta().variant ?? 'outline'"
          [size]="secondaryCta().size ?? 'md'">
          {{ secondaryCta().label }}
        </app-link>
      </div>
    </div>
    <div class="md:w-full lg:w-1/2 order-1" data-aos="zoom-in" data-aos-anchor-placement="center-bottom">
      <app-image
        [src]="image().src"
        [alt]="image().alt"
        [width]="image().width"
        [height]="image().height"
        [priority]="image().priority ?? false" />
    </div>
  </div>
</section>
