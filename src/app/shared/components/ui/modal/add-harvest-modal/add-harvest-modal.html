<app-modal-shell [title]="title" (close)="cancel()">

  <div class="add-harvest">

    @if (error()) {
      <p class="add-harvest__error">{{ error() }}</p>
    }

    <!-- Apiary + Beehive selectors (add mode only) -->
    @if (!isEditMode) {
      <div class="add-harvest__selectors">
        <div class="add-harvest__field">
          <label class="add-harvest__label">Apiary *</label>
          <select
            class="add-harvest__select"
            [ngModel]="selectedApiaryId()"
            (ngModelChange)="onApiaryChange($event)"
            name="apiary">
            <option [value]="0">— Select apiary —</option>
            @for (a of data.apiaries; track a.id) {
              <option [value]="a.id">{{ a.name }}</option>
            }
          </select>
        </div>

        <div class="add-harvest__field">
          <label class="add-harvest__label">Beehive</label>
          <select
            class="add-harvest__select"
            [ngModel]="selectedBeehiveId()"
            (ngModelChange)="selectedBeehiveId.set($event)"
            name="beehive"
            [disabled]="selectedApiaryId() === 0">
            <option [value]="0">— All beehives —</option>
            @for (b of beehives(); track b.id) {
              <option [value]="b.id">{{ b.name }}</option>
            }
          </select>
        </div>
      </div>

      @if (selectedApiaryId() !== 0 && selectedBeehiveId() === 0) {
        <p class="add-harvest__hint">Record will be created for all beehives in the selected apiary.</p>
      }
    }

    <!-- Form fields -->
    <div class="add-harvest__form-row">
      <div class="add-harvest__field add-harvest__field--col">
        <label class="add-harvest__label">Date *</label>
        <input class="add-harvest__input" type="date" [(ngModel)]="date" name="date" />
      </div>
      <div class="add-harvest__field add-harvest__field--col">
        <label class="add-harvest__label">Type</label>
        <select class="add-harvest__select" [(ngModel)]="honey_type" name="honey_type">
          @for (ht of HARVEST_TYPES; track ht.value) {
            <option [ngValue]="ht.value">{{ ht.label }}</option>
          }
        </select>
      </div>
      @if (honey_type === 'honey') {
        <div class="add-harvest__field add-harvest__field--col add-harvest__field--wide">
          <label class="add-harvest__label">Description</label>
          <input class="add-harvest__input" type="text" [(ngModel)]="honey_description" name="honey_description" placeholder="e.g. thyme, wildflower..." />
        </div>
      }
      <div class="add-harvest__field add-harvest__field--col">
        <label class="add-harvest__label">Total Quantity</label>
        <input class="add-harvest__input" type="number" min="0" [(ngModel)]="food_quantity" name="food_quantity" />
      </div>
      <div class="add-harvest__field add-harvest__field--col">
        <label class="add-harvest__label">Unit</label>
        <select class="add-harvest__select" [(ngModel)]="unit" name="unit">
          @for (u of HARVEST_UNITS; track u.value) {
            <option [ngValue]="u.value">{{ u.label }}</option>
          }
        </select>
      </div>
    </div>

  </div>

  <ng-template #footer>
    <button class="add-harvest__btn add-harvest__btn--ghost" (click)="cancel()">Cancel</button>
    <button class="add-harvest__btn add-harvest__btn--primary" (click)="save()">Save</button>
  </ng-template>

</app-modal-shell>
