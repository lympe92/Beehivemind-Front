<app-modal-shell [title]="title" (close)="cancel()">

  <div class="add-cat">

    @if (error()) {
      <p class="add-cat__error">{{ error() }}</p>
    }

    <div class="add-cat__field">
      <label class="add-cat__label">Name *</label>
      <input class="add-cat__input" [(ngModel)]="name" name="name" placeholder="Category name" />
    </div>

    <div class="add-cat__field">
      <label class="add-cat__label">Description</label>
      <input class="add-cat__input" [(ngModel)]="description" name="description" placeholder="Optional description" />
    </div>

    <div class="add-cat__field">
      <label class="add-cat__label">Type</label>
      <select class="add-cat__select" [(ngModel)]="type" name="type">
        <option value="income">Income</option>
        <option value="outcome">Outgoing</option>
      </select>
    </div>

  </div>

  <ng-template #footer>
    <button class="add-cat__btn add-cat__btn--ghost" (click)="cancel()">Cancel</button>
    <button class="add-cat__btn add-cat__btn--primary" (click)="save()">Save</button>
  </ng-template>

</app-modal-shell>
