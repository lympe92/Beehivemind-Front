<app-modal-shell [title]="title" (close)="cancel()">

  <div class="add-feeding">

    @if (error()) {
      <p class="add-feeding__error">{{ error() }}</p>
    }

    <!-- Apiary + Beehive selectors (add mode only) -->
    @if (!isEditMode) {
      <div class="add-feeding__selectors">
        <div class="add-feeding__field">
          <label class="add-feeding__label">Apiary *</label>
          <select
            class="add-feeding__select"
            [ngModel]="selectedApiaryId()"
            (ngModelChange)="onApiaryChange($event)"
            name="apiary">
            <option [value]="0">— Select apiary —</option>
            @for (a of data.apiaries; track a.id) {
              <option [value]="a.id">{{ a.name }}</option>
            }
          </select>
        </div>

        <div class="add-feeding__field">
          <label class="add-feeding__label">Beehive</label>
          <select
            class="add-feeding__select"
            [ngModel]="selectedBeehiveId()"
            (ngModelChange)="selectedBeehiveId.set($event)"
            name="beehive"
            [disabled]="selectedApiaryId() === 0">
            <option [value]="0">— All beehives —</option>
            @for (b of beehives(); track b.id) {
              <option [value]="b.id">{{ b.name }}</option>
            }
          </select>
        </div>
      </div>

      @if (selectedApiaryId() !== 0 && selectedBeehiveId() === 0) {
        <p class="add-feeding__hint">Record will be created for all beehives in the selected apiary.</p>
      }
    }

    <!-- Form fields -->
    <div class="add-feeding__form-row">
      <div class="add-feeding__field add-feeding__field--col">
        <label class="add-feeding__label">Date *</label>
        <input class="add-feeding__input" type="date" [(ngModel)]="date" name="date" />
      </div>
      <div class="add-feeding__field add-feeding__field--col">
        <label class="add-feeding__label">Feeding Type</label>
        <select class="add-feeding__select" [(ngModel)]="feeding_type" name="feeding_type">
          @for (ft of FEEDING_TYPES; track ft.value) {
            <option [ngValue]="ft.value">{{ ft.label }}</option>
          }
        </select>
      </div>
      <div class="add-feeding__field add-feeding__field--col">
        <label class="add-feeding__label">Food Type</label>
        <select class="add-feeding__select" [(ngModel)]="food_type" name="food_type">
          @for (ft of FOOD_TYPES; track ft.value) {
            <option [ngValue]="ft.value">{{ ft.label }}</option>
          }
        </select>
      </div>
      <div class="add-feeding__field add-feeding__field--col">
        <label class="add-feeding__label">Qty / Beehive</label>
        <input class="add-feeding__input" type="number" min="0" [(ngModel)]="food_quantity" name="food_quantity" />
      </div>
      <div class="add-feeding__field add-feeding__field--col">
        <label class="add-feeding__label">Unit</label>
        <select class="add-feeding__select" [(ngModel)]="unit" name="unit">
          @for (u of FEEDING_UNITS; track u.value) {
            <option [ngValue]="u.value">{{ u.label }}</option>
          }
        </select>
      </div>
    </div>

  </div>

  <ng-template #footer>
    <button class="add-feeding__btn add-feeding__btn--ghost" (click)="cancel()">Cancel</button>
    <button class="add-feeding__btn add-feeding__btn--primary" (click)="save()">Save</button>
  </ng-template>

</app-modal-shell>
