<div class="form-group">
  @if (label) {
    <label class="form-label">{{ label }}{{ isRequired ? ' *' : '' }}</label>
  }
  <div class="input-container" [class.has-icon]="inputType === 'password'">
    <input
      #inputElement
      class="form-control"
      [class.no-spinners]="noSpinners"
      [class.filled]="value"
      [class.invalid]="isFieldValid()"
      [autocomplete]="autocomplete"
      [type]="type"
      [value]="value"
      [disabled]="disabled"
      [placeholder]="placeholder"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />
    @if (inputType === 'password') {
      <div class="input-icon">
        @if (!isPasswordVisible) {
          <span class="eye-icon" (click)="showPassword()">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path d="m45.423 23.119c-.391-.538-9.703-13.175-21.423-13.175s-21.032 12.636-21.422 13.174c-.381.525-.381 1.237 0 1.763.39.538 9.702 13.175 21.422 13.175s21.032-12.637 21.423-13.174c.382-.526.382-1.238 0-1.763zm-21.423 11.937c-8.53 0-16.038-8.294-18.301-11.056 2.263-2.762 9.771-11.056 18.301-11.056s16.038 8.294 18.302 11.056c-2.264 2.762-9.772 11.056-18.302 11.056zm4.221-16.174c-.688.46-.873 1.392-.413 2.081.502.751.768 1.629.768 2.538 0 2.522-2.053 4.575-4.575 4.575s-4.575-2.053-4.575-4.575 2.052-4.575 4.575-4.575c.829 0 1.5-.671 1.5-1.5s-.671-1.5-1.5-1.5c-4.177 0-7.575 3.398-7.575 7.575s3.398 7.575 7.575 7.575 7.575-3.398 7.575-7.575c0-1.504-.44-2.958-1.273-4.205-.462-.691-1.394-.874-2.082-.414z"/>
            </svg>
          </span>
        } @else {
          <span class="eye-icon" (click)="hidePassword()">
            <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path d="m19.356 13.72c1.578-.515 3.14-.776 4.644-.776 8.531 0 16.04 8.296 18.303 11.057-.81.992-2.292 2.694-4.247 4.46-.614.556-.662 1.504-.107 2.119.297.327.704.494 1.113.494.359 0 .719-.128 1.006-.387 3.273-2.959 5.271-5.692 5.355-5.807.382-.525.382-1.237 0-1.763-.391-.536-9.703-13.173-21.423-13.173-1.82 0-3.695.311-5.574.924-.788.257-1.218 1.104-.96 1.891.256.789 1.105 1.22 1.89.961zm-14.579-9.72c-.624-.543-1.572-.479-2.116.146-.545.624-.479 1.571.145 2.116l9.087 7.919c-5.52 3.772-9.151 8.712-9.315 8.938-.381.525-.381 1.237 0 1.763.39.537 9.702 13.174 21.422 13.174 3.62 0 7.366-1.225 11.145-3.612l8.078 7.04c.284.248.635.369.984.369.419 0 .835-.174 1.132-.515.544-.624.479-1.572-.146-2.116zm15.252 17.27 6.732 5.867c-.787.596-1.753.938-2.761.938-2.522 0-4.575-2.053-4.575-4.575 0-.8.223-1.555.604-2.23zm3.971 13.786c-8.531 0-16.039-8.295-18.302-11.057 1.326-1.621 4.467-5.135 8.548-7.768l3.476 3.03c-.842 1.24-1.298 2.699-1.298 4.239 0 4.177 3.398 7.575 7.575 7.575 1.879 0 3.674-.71 5.051-1.942l3.727 3.248c-3.022 1.771-5.969 2.675-8.777 2.675z"/>
            </svg>
          </span>
        }
      </div>
    }
  </div>
  @if (displayErrors) {
    <app-form-errors
      [errors]="saFormControlName?.valid === false && saFormControlName?.touched ? (saFormControlName?.control?.errors ?? null) : null"
    />
  }
</div>
